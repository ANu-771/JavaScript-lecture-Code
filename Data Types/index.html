<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    



    <!-- Java script codes goes here -->

    <script>
        // Data types in JavaScript

        // 1. String
        let name = "Kevin subasingha";
        console.log(name); // Output: John Doe

        // 2. Number
        let age = 30;
        let pi = 3.14;
        console.log(age); // Output: 30
        console.log(pi); // Output: 3.14

        // 3. Boolean
        let isStudent = true;
        let isGraduate = false;
        console.log(isStudent); // Output: true
        console.log(isGraduate); // Output: false

        // 4. Null
        let emptyValue = null; //this means variable exits, but it has no value
        console.log(emptyValue); // Output: null

        // 5. Undefined
        let unidetilaedVariable; // this means variable exits, but it has no value
        console.log(unidetilaedVariable); // Output: undefined

        // 6. Object
        let person = {
            name: "Isuru",
            age: 25,
            isStudent: false
        };
        console.log(person); // Output: { name: 'Alice', age: 25, isStudent: false }

    </script>
</body>
</html>
